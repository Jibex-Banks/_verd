<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verd — Drone Field Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1408;
  --surface:   #141a0e;
  --card:      #1a2212;
  --border:    #2a3820;
  --border-hi: #3d5428;
  --green:     #5cdb6f;
  --green-dim: #2d6a3f;
  --amber:     #f5a623;
  --orange:    #e85d26;
  --red:       #c0392b;
  --red-bright:#e74c3c;
  --text:      #e8f0e0;
  --muted:     #6b8060;
  --font-head: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-head);
  min-height: 100vh;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.logo em { color: var(--green); font-style: normal; }
.live-badge {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-family: var(--font-mono); color: var(--green);
  letter-spacing: 0.1em; padding: 5px 12px;
  border: 1px solid var(--green-dim); border-radius: 20px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

/* ── Layout ── */
main {
  max-width: 1200px; margin: 0 auto; padding: 32px 24px;
  display: grid; grid-template-columns: 340px 1fr;
  gap: 20px; align-items: start;
}
@media (max-width: 820px) { main { grid-template-columns: 1fr; } }

/* ── Upload panel ── */
.upload-panel { display: flex; flex-direction: column; gap: 14px; }
.drop-zone {
  border: 1.5px dashed var(--border-hi); border-radius: 14px;
  background: var(--card); min-height: 220px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  position: relative; overflow: hidden;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--green); background: #1e2c16; }
.drop-icon {
  width: 52px; height: 52px; border-radius: 50%; background: var(--border);
  display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
}
.drop-icon svg { width: 24px; height: 24px; stroke: var(--green); fill: none; }
.drop-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.drop-sub   { font-size: 12px; color: var(--muted); }

#preview-wrap { display: none; position: relative; border-radius: 12px; overflow: hidden; }
#preview-img  { width: 100%; display: block; max-height: 220px; object-fit: cover; border-radius: 12px; }

.scan-btn {
  width: 100%; padding: 13px; background: var(--green);
  color: #0d1408; border: none; border-radius: 10px;
  font-family: var(--font-head); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s; letter-spacing: 0.02em;
}
.scan-btn:hover:not(:disabled) { opacity: 0.88; }
.scan-btn:active:not(:disabled) { transform: scale(0.98); }
.scan-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Result panel ── */
.result-panel { display: flex; flex-direction: column; gap: 16px; }
.state-empty {
  border: 1px solid var(--border); border-radius: 14px; background: var(--card);
  min-height: 400px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); font-size: 13px; gap: 12px;
}
.state-empty svg { opacity: 0.3; }

/* ── Metrics ── */
.metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 600px) { .metrics-row { grid-template-columns: repeat(2,1fr); } }
.metric-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 12px; text-align: center;
}
.metric-val { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.metric-lbl { font-size: 10px; font-family: var(--font-mono); color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.val-critical { color: var(--red-bright); }
.val-moderate { color: var(--orange); }
.val-low      { color: var(--amber); }
.val-neutral  { color: var(--green); }

.action-banner {
  border-radius: 10px; padding: 11px 16px; font-size: 13px;
  font-weight: 600; display: flex; align-items: center; gap: 10px;
}
.banner-critical { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: var(--red-bright); }
.banner-moderate { background: rgba(232,93,38,0.12); border: 1px solid rgba(232,93,38,0.25); color: var(--orange); }
.banner-ok       { background: rgba(92,219,111,0.1);  border: 1px solid rgba(92,219,111,0.2); color: var(--green); }

.heatmap-layout { display: grid; grid-template-columns: 1fr 270px; gap: 14px; }
@media (max-width: 600px) { .heatmap-layout { grid-template-columns: 1fr; } }
.heatmap-card, .zone-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
}
.zone-card { display: flex; flex-direction: column; gap: 10px; }
.card-label {
  font-size: 10px; font-family: var(--font-mono); color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
}
.heatmap-container { position: relative; border-radius: 10px; overflow: hidden; background: #111; }
#heatmap-base-img { width: 100%; display: block; opacity: 0.45; border-radius: 10px; }
#heatmap-overlay  { position: absolute; inset: 0; display: grid; }
.h-cell { cursor: pointer; transition: filter 0.12s, outline 0.1s; outline: 1px solid rgba(0,0,0,0.15); }
.h-cell:hover { filter: brightness(1.35); z-index: 5; }
.h-cell.sel   { outline: 2px solid white; z-index: 10; }
.legend-strip { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.legend-grad  { flex: 1; height: 6px; border-radius: 3px; background: linear-gradient(to right, #2e7d32, #aed581, #f9a825, #e65100, #c0392b); }
.legend-txt   { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

.zone-disease-name { font-size: 15px; font-weight: 600; }
.zone-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-family: var(--font-mono);
  padding: 3px 10px; border-radius: 12px; font-weight: 500;
}
.badge-critical { background: rgba(192,57,43,0.2);  color: var(--red-bright); }
.badge-moderate { background: rgba(232,93,38,0.15); color: var(--orange); }
.badge-low      { background: rgba(245,166,35,0.15); color: var(--amber); }
.badge-healthy  { background: rgba(92,219,111,0.12); color: var(--green); }
.sev-bar-track  { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.sev-bar-fill   { height: 100%; border-radius: 3px; transition: width 0.4s; }
.zone-meta { display: flex; flex-direction: column; gap: 6px; }
.zone-row  { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.zone-row:last-child { border-bottom: none; }
.zk { color: var(--muted); font-family: var(--font-mono); }
.zv { font-weight: 500; font-size: 11px; }
.treatment-section { display: flex; flex-direction: column; gap: 4px; }
.treat-title { font-size: 9px; font-family: var(--font-mono); color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.treat-item {
  font-size: 11px; color: var(--text); padding: 5px 0 5px 12px;
  position: relative; border-bottom: 1px solid var(--border); line-height: 1.5;
}
.treat-item:last-child { border-bottom: none; }
.treat-item::before { content: '→'; position: absolute; left: 0; color: var(--green); font-weight: 600; }
.scan-meta {
  display: flex; align-items: center; gap: 16px;
  font-size: 11px; font-family: var(--font-mono); color: var(--muted); flex-wrap: wrap;
}
.scan-meta span { display: flex; align-items: center; gap: 5px; }
.scan-meta strong { color: var(--text); }
.error-box {
  background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3);
  border-radius: 10px; padding: 14px 16px; color: var(--red-bright); font-size: 13px; line-height: 1.6;
}
.zone-placeholder {
  color: var(--muted); font-size: 12px; text-align: center; margin: auto 0; line-height: 1.7;
}

/* ═══════════════════════════════════════════════════════════
   LOADER OVERLAY
   ═══════════════════════════════════════════════════════════ */
#scan-loader {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(13, 20, 8, 0.92);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
}
#scan-loader.active { display: flex; }

/* ── Drone SVG container ── */
.loader-drone-wrap {
  position: relative;
  width: 220px;
  height: 220px;
  margin-bottom: 8px;
}

/* Outer rotating ring */
.drone-ring-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-top-color: var(--green);
  border-right-color: var(--green-dim);
  animation: spin-cw 2.4s linear infinite;
}
/* Inner counter-rotating ring */
.drone-ring-inner {
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: #3d5428;
  border-left-color: var(--green-dim);
  animation: spin-ccw 1.8s linear infinite;
}
/* Radar sweep */
.drone-radar {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  overflow: hidden;
}
.radar-sweep {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    transparent 0deg,
    rgba(92,219,111,0.0) 200deg,
    rgba(92,219,111,0.08) 280deg,
    rgba(92,219,111,0.22) 340deg,
    rgba(92,219,111,0.32) 360deg
  );
  animation: spin-cw 2.4s linear infinite;
}
/* Grid lines inside radar */
.radar-grid {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  overflow: hidden;
}
.radar-grid::before,
.radar-grid::after {
  content: '';
  position: absolute;
  background: var(--green-dim);
  opacity: 0.35;
}
.radar-grid::before { width: 1px; top: 0; bottom: 0; left: 50%; }
.radar-grid::after  { height: 1px; left: 0; right: 0; top: 50%; }
/* Concentric circles */
.radar-circle {
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--green-dim);
  opacity: 0.2;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* Drone body SVG */
.drone-svg-center {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.drone-body {
  animation: drone-bob 2.2s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(92,219,111,0.5));
}
@keyframes drone-bob {
  0%,100% { transform: translateY(0px) scale(1); }
  50%      { transform: translateY(-5px) scale(1.02); }
}

/* Propeller spin */
.prop { animation: spin-cw 0.25s linear infinite; transform-box: fill-box; transform-origin: center; }

/* Corner scan brackets */
.scan-brackets {
  position: absolute;
  inset: 28px;
}
.bracket {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--green);
  border-style: solid;
  opacity: 0.7;
  animation: bracket-pulse 2s ease-in-out infinite;
}
.bracket-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
.bracket-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
.bracket-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
.bracket-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
@keyframes bracket-pulse { 0%,100%{opacity:0.7;} 50%{opacity:0.3;} }

/* Ping dot at center */
.radar-ping {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: ping 2.4s ease-out infinite;
}
.radar-ping::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1.5px solid var(--green);
  animation: ping-ring 2.4s ease-out infinite;
}
@keyframes ping { 0%,100%{opacity:1} 60%{opacity:0.6} }
@keyframes ping-ring { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(3.5);opacity:0} }

/* ── Progress bar ── */
.loader-progress-track {
  width: 240px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}
.loader-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--green);
  width: 0%;
  transition: width 0.35s ease;
  position: relative;
}
.loader-progress-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(to right, transparent, rgba(92,219,111,0.8));
}

/* ── Status ticker ── */
.loader-status {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--green);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 12px;
  min-height: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-cursor {
  display: inline-block;
  width: 6px; height: 12px;
  background: var(--green);
  animation: blink 0.9s step-end infinite;
  vertical-align: middle;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Scan lines ── */
.loader-scanline {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(13,20,8,0.07) 3px,
    rgba(13,20,8,0.07) 4px
  );
  animation: scanline-move 6s linear infinite;
  z-index: 1000;
  opacity: 0.4;
}
@keyframes scanline-move {
  from { background-position: 0 0; }
  to   { background-position: 0 200px; }
}

/* Loader title */
.loader-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  margin-top: 6px;
}
.loader-sub {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  margin-top: 2px;
}

/* ── Grid cell reveal animation ── */
.h-cell {
  animation: cell-reveal 0.4s ease-out both;
}
@keyframes cell-reveal {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes spin-cw  { to { transform: rotate(360deg); } }
@keyframes spin-ccw { to { transform: rotate(-360deg); } }
</style>
</head>
<body>

<!-- ═══ LOADER OVERLAY ═══ -->
<div id="scan-loader">
  <!-- CRT scanline texture -->
  <div class="loader-scanline"></div>

  <div class="loader-drone-wrap">
    <!-- Rotating outer ring -->
    <div class="drone-ring-outer"></div>
    <!-- Counter-rotating inner ring -->
    <div class="drone-ring-inner"></div>

    <!-- Radar sweep + grid -->
    <div class="drone-radar">
      <div class="radar-grid">
        <!-- concentric circles -->
        <div class="radar-circle" style="width:40%;height:40%;"></div>
        <div class="radar-circle" style="width:65%;height:65%;"></div>
        <div class="radar-circle" style="width:88%;height:88%;"></div>
      </div>
      <div class="radar-sweep"></div>
    </div>

    <!-- Corner brackets -->
    <div class="scan-brackets">
      <div class="bracket bracket-tl"></div>
      <div class="bracket bracket-tr"></div>
      <div class="bracket bracket-bl"></div>
      <div class="bracket bracket-br"></div>
    </div>

    <!-- Ping -->
    <div class="radar-ping"></div>

    <!-- Drone SVG -->
    <div class="drone-svg-center">
      <svg class="drone-body" width="62" height="62" viewBox="0 0 62 62" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Arms -->
        <line x1="31" y1="31" x2="12" y2="12" stroke="#3d5428" stroke-width="2" stroke-linecap="round"/>
        <line x1="31" y1="31" x2="50" y2="12" stroke="#3d5428" stroke-width="2" stroke-linecap="round"/>
        <line x1="31" y1="31" x2="12" y2="50" stroke="#3d5428" stroke-width="2" stroke-linecap="round"/>
        <line x1="31" y1="31" x2="50" y2="50" stroke="#3d5428" stroke-width="2" stroke-linecap="round"/>

        <!-- Propeller groups (each rotates) -->
        <g class="prop" style="transform-origin:12px 12px;">
          <ellipse cx="12" cy="12" rx="9" ry="3" fill="none" stroke="#5cdb6f" stroke-width="1.5" opacity="0.6"/>
        </g>
        <g class="prop" style="transform-origin:50px 12px;">
          <ellipse cx="50" cy="12" rx="9" ry="3" fill="none" stroke="#5cdb6f" stroke-width="1.5" opacity="0.6"/>
        </g>
        <g class="prop" style="transform-origin:12px 50px;">
          <ellipse cx="12" cy="50" rx="9" ry="3" fill="none" stroke="#5cdb6f" stroke-width="1.5" opacity="0.6"/>
        </g>
        <g class="prop" style="transform-origin:50px 50px;">
          <ellipse cx="50" cy="50" rx="9" ry="3" fill="none" stroke="#5cdb6f" stroke-width="1.5" opacity="0.6"/>
        </g>

        <!-- Hub -->
        <rect x="22" y="22" width="18" height="18" rx="4" fill="#1a2212" stroke="#5cdb6f" stroke-width="1.5"/>
        <!-- Camera lens -->
        <circle cx="31" cy="31" r="5" fill="none" stroke="#5cdb6f" stroke-width="1.2" opacity="0.9"/>
        <circle cx="31" cy="31" r="2.5" fill="#5cdb6f" opacity="0.5"/>

        <!-- Motor dots -->
        <circle cx="12" cy="12" r="3" fill="#1a2212" stroke="#2d6a3f" stroke-width="1.2"/>
        <circle cx="50" cy="12" r="3" fill="#1a2212" stroke="#2d6a3f" stroke-width="1.2"/>
        <circle cx="12" cy="50" r="3" fill="#1a2212" stroke="#2d6a3f" stroke-width="1.2"/>
        <circle cx="50" cy="50" r="3" fill="#1a2212" stroke="#2d6a3f" stroke-width="1.2"/>
      </svg>
    </div>
  </div>

  <div class="loader-title">Scanning Field</div>
  <div class="loader-sub" id="loader-pct">0%</div>

  <div class="loader-progress-track">
    <div class="loader-progress-fill" id="loader-bar"></div>
  </div>

  <div class="loader-status">
    <span id="loader-status-text">INITIALISING</span>
    <span class="status-cursor"></span>
  </div>
</div>

<header>
  <div class="logo"><em>Verd</em> <span style="font-weight:300;font-size:14px;color:var(--muted);margin-left:6px;">Drone Field Analysis</span></div>
  <div class="live-badge"><div class="live-dot"></div>DEMO MODE</div>
</header>

<main>
  <!-- LEFT: Upload panel -->
  <div class="upload-panel">
    <input type="file" id="file-input" accept="image/jpeg,image/png" style="display:none"/>

    <div class="drop-zone" id="drop-zone">
      <div id="drop-placeholder">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>
          </div>
          <div class="drop-title">Upload drone image</div>
          <div class="drop-sub">JPG or PNG · drag & drop or click</div>
        </div>
      </div>
    </div>

    <div id="preview-wrap" style="display:none;position:relative;border-radius:12px;overflow:hidden;">
      <img id="preview-img" alt="preview" style="width:100%;display:block;max-height:220px;object-fit:cover;border-radius:12px;"/>
      <button onclick="dropZone.style.display='flex';previewWrap.style.display='none';scanBtn.disabled=true;scanBtn._file=null;clearResults();fileInput.click();"
        style="position:absolute;bottom:10px;right:10px;background:rgba(13,20,8,0.8);color:var(--green);border:1px solid var(--green-dim);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-head);">Change image</button>
    </div>

    <button class="scan-btn" id="scan-btn" disabled onclick="runScan()">Analyse Field</button>
    <div id="error-area"></div>
  </div>

  <!-- RIGHT: Result panel -->
  <div class="result-panel" id="result-panel">
    <div class="state-empty" id="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <span>Upload a drone image and click Analyse Field</span>
    </div>
    <div id="results" style="display:none;"></div>
  </div>
</main>

<script>
const API_URL = 'https://jibexbanks-verd.hf.space';
let scanData = null;
let selCell  = null;

// ── File input ────────────────────────────────────────────────────────────────
const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');
const scanBtn     = document.getElementById('scan-btn');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
  fileInput.value = '';
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  if (!file || !file.type.match(/image\/(jpeg|png)/)) return;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  dropZone.style.display    = 'none';
  previewWrap.style.display = 'block';
  scanBtn.disabled = false;
  scanBtn._file    = file;
  clearResults();
}

// ═════════════════════════════════════════════════════════
// LOADER LOGIC
// ═════════════════════════════════════════════════════════
const STATUSES = [
  'INITIALISING SENSOR ARRAY',
  'CALIBRATING GPS TELEMETRY',
  'SEGMENTING FIELD GRID',
  'RUNNING INFERENCE ENGINE',
  'MAPPING DISEASE SIGNATURES',
  'CROSS-REFERENCING PATHOGEN DB',
  'COMPUTING SEVERITY SCORES',
  'GENERATING TREATMENT PLAN',
  'FINALISING SCAN REPORT',
];

let loaderInterval  = null;
let statusInterval  = null;
let loaderPct       = 0;

function showLoader() {
  const overlay = document.getElementById('scan-loader');
  const bar     = document.getElementById('loader-bar');
  const pctEl   = document.getElementById('loader-pct');
  const statusEl= document.getElementById('loader-status-text');

  overlay.classList.add('active');
  loaderPct = 0;
  bar.style.width = '0%';

  let statusIdx = 0;
  statusEl.textContent = STATUSES[0];

  // Progress ticks: fast at start, slows near 90%, then jumps to 100 on complete
  loaderInterval = setInterval(() => {
    const remaining = 90 - loaderPct;
    const step = Math.max(0.4, remaining * 0.035);
    loaderPct = Math.min(90, loaderPct + step);
    bar.style.width  = loaderPct + '%';
    pctEl.textContent = Math.round(loaderPct) + '%';
  }, 120);

  // Status cycle
  statusInterval = setInterval(() => {
    statusIdx = (statusIdx + 1) % STATUSES.length;
    // Typewriter effect
    typeStatus(statusEl, STATUSES[statusIdx]);
  }, 1400);
}

function typeStatus(el, text) {
  el.textContent = '';
  let i = 0;
  const iv = setInterval(() => {
    el.textContent += text[i] || '';
    i++;
    if (i >= text.length) clearInterval(iv);
  }, 28);
}

function completeLoader(cb) {
  clearInterval(loaderInterval);
  clearInterval(statusInterval);

  const bar   = document.getElementById('loader-bar');
  const pctEl = document.getElementById('loader-pct');
  const statusEl = document.getElementById('loader-status-text');

  typeStatus(statusEl, 'SCAN COMPLETE');

  // Animate to 100%
  let p = loaderPct;
  const finish = setInterval(() => {
    p = Math.min(100, p + 4);
    bar.style.width   = p + '%';
    pctEl.textContent = Math.round(p) + '%';
    if (p >= 100) {
      clearInterval(finish);
      // Brief pause then hide
      setTimeout(() => {
        const overlay = document.getElementById('scan-loader');
        overlay.style.transition = 'opacity 0.45s ease';
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.classList.remove('active');
          overlay.style.opacity = '';
          overlay.style.transition = '';
          if (cb) cb();
        }, 460);
      }, 420);
    }
  }, 30);
}

function hideLoaderImmediate() {
  clearInterval(loaderInterval);
  clearInterval(statusInterval);
  const overlay = document.getElementById('scan-loader');
  overlay.classList.remove('active');
}

// ── Scan ──────────────────────────────────────────────────────────────────────
async function runScan() {
  const file   = scanBtn._file;
  const apiUrl = API_URL.replace(/\/$/, '');
  if (!file) return;

  clearResults();
  document.getElementById('error-area').innerHTML = '';
  scanBtn.disabled = true;
  scanBtn.textContent = 'Analysing…';

  showLoader();

  try {
    const form = new FormData();
    form.append('image', file);
    const res = await fetch(`${apiUrl}/scan`, { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    scanData = await res.json();
    completeLoader(() => {
      renderResults(scanData, previewImg.src);
      scanBtn.disabled = false;
      scanBtn.textContent = 'Analyse Field';
    });
  } catch (e) {
    hideLoaderImmediate();
    document.getElementById('error-area').innerHTML =
      `<div class="error-box">
        <strong>Connection error</strong><br>
        ${e.message}<br><br>
        Make sure the FastAPI server is running at <code>${API_URL}</code> and CORS is enabled.
      </div>`;
    scanBtn.disabled = false;
    scanBtn.textContent = 'Analyse Field';
  }
}

function clearResults() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('error-area').innerHTML = '';
  selCell = null; scanData = null;
}

// ── Render ────────────────────────────────────────────────────────────────────
function severityColor(s) {
  if (s >= 0.75) return '#c0392b';
  if (s >= 0.60) return '#e74c3c';
  if (s >= 0.45) return '#e85d26';
  if (s >= 0.30) return '#f5a623';
  if (s >= 0.20) return '#d4c84a';
  if (s >= 0.10) return '#aed581';
  return '#2e7d32';
}

function renderResults(data, imgSrc) {
  document.getElementById('empty-state').style.display = 'none';
  const s = data.summary;
  const bannerClass = s.critical_zones > 6 ? 'banner-critical'
    : s.moderate_zones > 6                  ? 'banner-moderate'
    : 'banner-ok';

  const html = `
    <div class="scan-meta">
      <span>ID <strong>${data.scan_id}</strong></span>
      <span>File <strong>${data.filename}</strong></span>
      <span>Grid <strong>${data.grid_rows}×${data.grid_cols}</strong></span>
      <span>Affected <strong>${s.affected_pct}%</strong></span>
    </div>
    <div class="metrics-row">
      <div class="metric-card"><div class="metric-val val-critical">${s.critical_zones}</div><div class="metric-lbl">Critical</div></div>
      <div class="metric-card"><div class="metric-val val-moderate">${s.moderate_zones}</div><div class="metric-lbl">Moderate</div></div>
      <div class="metric-card"><div class="metric-val val-low">${s.low_zones}</div><div class="metric-lbl">Low risk</div></div>
      <div class="metric-card"><div class="metric-val val-neutral">${s.healthy_zones}</div><div class="metric-lbl">Healthy</div></div>
    </div>
    <div class="action-banner ${bannerClass}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/>
      </svg>
      ${s.recommended_action}
      ${s.diseases_detected.length ? `— <em>${s.diseases_detected.join(', ')}</em>` : ''}
    </div>
    <div class="heatmap-layout">
      <div class="heatmap-card">
        <div class="card-label">Disease intensity map — click a zone</div>
        <div class="heatmap-container" id="heatmap-container">
          <img id="heatmap-base-img" src="${imgSrc}" alt="field"/>
          <div id="heatmap-overlay"></div>
        </div>
        <div class="legend-strip">
          <span class="legend-txt">Healthy</span>
          <div class="legend-grad"></div>
          <span class="legend-txt">Critical</span>
        </div>
      </div>
      <div class="zone-card" id="zone-card">
        <div class="card-label">Zone detail</div>
        <div class="zone-placeholder">Tap any zone on<br>the heatmap to inspect it.</div>
      </div>
    </div>
  `;

  const container = document.getElementById('results');
  container.innerHTML = html;
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.gap = '14px';

  buildHeatmap(data);
}

function buildHeatmap(data) {
  const overlay = document.getElementById('heatmap-overlay');
  overlay.style.gridTemplateColumns = `repeat(${data.grid_cols}, 1fr)`;
  overlay.style.gridTemplateRows    = `repeat(${data.grid_rows}, 1fr)`;

  data.zones.forEach((z, idx) => {
    const cell = document.createElement('div');
    cell.className = 'h-cell';
    cell.style.background = severityColor(z.severity) + 'cc';
    cell.style.animationDelay = (idx * 18) + 'ms';
    cell.title = `${z.disease} · ${z.severity_label}`;
    cell.addEventListener('click', () => selectZone(z, cell));
    overlay.appendChild(cell);
  });
}

function selectZone(z, el) {
  if (selCell) selCell.classList.remove('sel');
  el.classList.add('sel');
  selCell = el;

  const color    = severityColor(z.severity);
  const pct      = Math.round(z.severity * 100);
  const conf     = Math.round(z.confidence * 100);
  const badgeCls = `badge-${z.severity_label}`;
  const isHealthy = z.disease === 'Healthy';

  document.getElementById('zone-card').innerHTML = `
    <div class="card-label">Zone — row ${z.row + 1} · col ${z.col + 1}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div class="zone-disease-name">${z.disease}</div>
      <span class="zone-badge ${badgeCls}">${z.severity_label.toUpperCase()}</span>
    </div>
    <div class="sev-bar-track">
      <div class="sev-bar-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="zone-meta">
      <div class="zone-row"><span class="zk">Severity</span><span class="zv">${pct}%</span></div>
      <div class="zone-row"><span class="zk">Confidence</span><span class="zv">${conf}%</span></div>
      ${!isHealthy ? `
      <div class="zone-row"><span class="zk">Yield impact</span><span class="zv" style="color:var(--orange);font-size:10px;text-align:right;max-width:160px;">${z.yield_impact}</span></div>
      <div class="zone-row"><span class="zk">Spread</span><span class="zv" style="font-size:10px;text-align:right;max-width:160px;">${z.spread_note}</span></div>` : ''}
    </div>
    ${!isHealthy ? `
    <div class="treatment-section">
      <div class="treat-title">Recommended actions</div>
      ${z.treatments.map(t => `<div class="treat-item">${t}</div>`).join('')}
    </div>` : `
    <div style="color:var(--green);font-size:12px;font-weight:500;">✓ This zone is healthy. No action required.</div>`}
  `;
}
</script>
</body>
</html>
