<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verd — Drone Field Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1408;
  --surface:   #141a0e;
  --card:      #1a2212;
  --border:    #2a3820;
  --border-hi: #3d5428;
  --green:     #5cdb6f;
  --green-dim: #2d6a3f;
  --amber:     #f5a623;
  --orange:    #e85d26;
  --red:       #c0392b;
  --red-bright:#e74c3c;
  --text:      #e8f0e0;
  --muted:     #6b8060;
  --font-head: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-head);
  min-height: 100vh;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo em { color: var(--green); font-style: normal; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--green);
  letter-spacing: 0.1em;
  padding: 5px 12px;
  border: 1px solid var(--green-dim);
  border-radius: 20px;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

/* ── Layout ── */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 820px) {
  main { grid-template-columns: 1fr; }
}

/* ── Upload panel ── */
.upload-panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.drop-zone {
  border: 1.5px dashed var(--border-hi);
  border-radius: 14px;
  background: var(--card);
  min-height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--green);
  background: #1e2c16;
}
.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.drop-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.drop-icon svg { width: 24px; height: 24px; stroke: var(--green); fill: none; }
.drop-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.drop-sub   { font-size: 12px; color: var(--muted); }

#preview-wrap { display: none; width: 100%; position: relative; }
#preview-img  { width: 100%; border-radius: 12px; display: block; max-height: 220px; object-fit: cover; }
.preview-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
#preview-wrap:hover .preview-overlay { opacity: 1; }
.preview-overlay span {
  font-size: 12px; color: white; font-weight: 600;
  background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px;
}

.api-row {
  display: flex; flex-direction: column; gap: 5px;
}
.api-label {
  font-size: 10px; font-family: var(--font-mono);
  color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
}
.api-input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
.api-input:focus { border-color: var(--green-dim); }

.scan-btn {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #0d1408;
  border: none;
  border-radius: 10px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}
.scan-btn:hover:not(:disabled) { opacity: 0.88; }
.scan-btn:active:not(:disabled) { transform: scale(0.98); }
.scan-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.scan-btn.loading {
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.25);
  border-top-color: #0d1408;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result panel ── */
.result-panel { display: flex; flex-direction: column; gap: 16px; }

.state-empty {
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--card);
  min-height: 400px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted);
  font-size: 13px;
  gap: 12px;
}
.state-empty svg { opacity: 0.3; }

/* ── Metric row ── */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
@media (max-width: 600px) { .metrics-row { grid-template-columns: repeat(2,1fr); } }

.metric-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
}
.metric-val {
  font-size: 28px; font-weight: 700; line-height: 1;
  margin-bottom: 4px;
}
.metric-lbl {
  font-size: 10px; font-family: var(--font-mono);
  color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
}
.val-critical { color: var(--red-bright); }
.val-moderate { color: var(--orange); }
.val-low      { color: var(--amber); }
.val-neutral  { color: var(--green); }

/* ── Action banner ── */
.action-banner {
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.banner-critical { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: var(--red-bright); }
.banner-moderate { background: rgba(232,93,38,0.12); border: 1px solid rgba(232,93,38,0.25); color: var(--orange); }
.banner-ok       { background: rgba(92,219,111,0.1);  border: 1px solid rgba(92,219,111,0.2); color: var(--green); }

/* ── Heatmap + side layout ── */
.heatmap-layout {
  display: grid;
  grid-template-columns: 1fr 270px;
  gap: 14px;
}
@media (max-width: 600px) { .heatmap-layout { grid-template-columns: 1fr; } }

.heatmap-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.card-label {
  font-size: 10px; font-family: var(--font-mono);
  color: var(--muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 12px;
}

/* The grid overlaid on the image */
.heatmap-container {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: #111;
}
#heatmap-base-img {
  width: 100%;
  display: block;
  opacity: 0.45;
  border-radius: 10px;
}
#heatmap-overlay {
  position: absolute;
  inset: 0;
  display: grid;
}

.h-cell {
  cursor: pointer;
  transition: filter 0.12s, outline 0.1s;
  outline: 1px solid rgba(0,0,0,0.15);
}
.h-cell:hover { filter: brightness(1.35); z-index: 5; }
.h-cell.sel   { outline: 2px solid white; z-index: 10; }

.legend-strip {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
}
.legend-grad {
  flex: 1; height: 6px; border-radius: 3px;
  background: linear-gradient(to right, #2e7d32, #aed581, #f9a825, #e65100, #c0392b);
}
.legend-txt { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

/* ── Zone detail ── */
.zone-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.zone-placeholder {
  color: var(--muted);
  font-size: 12px;
  text-align: center;
  margin: auto 0;
  line-height: 1.7;
}
.zone-disease-name { font-size: 15px; font-weight: 600; }
.zone-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-family: var(--font-mono);
  padding: 3px 10px; border-radius: 12px; font-weight: 500;
}
.badge-critical { background: rgba(192,57,43,0.2);  color: var(--red-bright); }
.badge-moderate { background: rgba(232,93,38,0.15); color: var(--orange); }
.badge-low      { background: rgba(245,166,35,0.15); color: var(--amber); }
.badge-healthy  { background: rgba(92,219,111,0.12); color: var(--green); }

.sev-bar-track {
  height: 5px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.sev-bar-fill  { height: 100%; border-radius: 3px; transition: width 0.4s; }

.zone-meta { display: flex; flex-direction: column; gap: 6px; }
.zone-row  { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.zone-row:last-child { border-bottom: none; }
.zk { color: var(--muted); font-family: var(--font-mono); }
.zv { font-weight: 500; font-size: 11px; }

.treatment-section { display: flex; flex-direction: column; gap: 4px; }
.treat-title {
  font-size: 9px; font-family: var(--font-mono);
  color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
}
.treat-item {
  font-size: 11px; color: var(--text);
  padding: 5px 0 5px 12px;
  position: relative;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
}
.treat-item:last-child { border-bottom: none; }
.treat-item::before { content: '→'; position: absolute; left: 0; color: var(--green); font-weight: 600; }

/* ── Scan meta bar ── */
.scan-meta {
  display: flex; align-items: center; gap: 16px;
  font-size: 11px; font-family: var(--font-mono); color: var(--muted);
  flex-wrap: wrap;
}
.scan-meta span { display: flex; align-items: center; gap: 5px; }
.scan-meta strong { color: var(--text); }

/* ── Error ── */
.error-box {
  background: rgba(192,57,43,0.1);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--red-bright);
  font-size: 13px;
  line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <div class="logo"><em>Verd</em> <span style="font-weight:300;font-size:14px;color:var(--muted);margin-left:6px;">Drone Field Analysis</span></div>
  <div class="live-badge"><div class="live-dot"></div>DEMO MODE</div>
</header>

<main>

  <!-- LEFT: Upload panel -->
  <div class="upload-panel">

    <!-- hidden file input, triggered manually -->
    <input type="file" id="file-input" accept="image/jpeg,image/png" style="display:none"/>

    <div class="drop-zone" id="drop-zone">
      <div id="drop-placeholder">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>
          </div>
          <div class="drop-title">Upload drone image</div>
          <div class="drop-sub">JPG or PNG · drag & drop or click</div>
        </div>
      </div>
    </div>

    <!-- preview shown after image selected -->
    <div id="preview-wrap" style="display:none;position:relative;border-radius:12px;overflow:hidden;">
      <img id="preview-img" alt="preview" style="width:100%;display:block;max-height:220px;object-fit:cover;border-radius:12px;"/>
      <button onclick="dropZone.style.display='block';previewWrap.style.display='none';scanBtn.disabled=true;scanBtn._file=null;clearResults();fileInput.click();" style="position:absolute;bottom:10px;right:10px;background:rgba(13,20,8,0.8);color:var(--green);border:1px solid var(--green-dim);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-head);">Change image</button>
    </div>

    <button class="scan-btn" id="scan-btn" disabled onclick="runScan()">
      Analyse Field
    </button>

    <div id="error-area"></div>

  </div>

  <!-- RIGHT: Result panel -->
  <div class="result-panel" id="result-panel">
    <div class="state-empty" id="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <span>Upload a drone image and click Analyse Field</span>
    </div>
    <div id="results" style="display:none;"></div>
  </div>

</main>

<script>

const API_URL = 'https://jibexbanks-verd.hf.space';

let scanData = null;
let selCell  = null;

// ── File input ────────────────────────────────────────────────────────────────

const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const placeholder = document.getElementById('drop-placeholder');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');
const scanBtn     = document.getElementById('scan-btn');

// Clicking the drop zone opens file picker
dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
  // Reset so same file can be re-selected
  fileInput.value = '';
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  if (!file || !file.type.match(/image\/(jpeg|png)/)) return;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  // Hide drop zone, show preview
  dropZone.style.display    = 'none';
  previewWrap.style.display = 'block';
  scanBtn.disabled = false;
  scanBtn._file    = file;
  clearResults();
}

// ── Scan ──────────────────────────────────────────────────────────────────────

async function runScan() {
  const file   = scanBtn._file;
  const apiUrl = API_URL.replace(/\/$/, '');
  if (!file) return;

  setLoading(true);
  clearResults();
  document.getElementById('error-area').innerHTML = '';

  const form = new FormData();
  form.append('image', file);

  try {
    const res = await fetch(`${apiUrl}/scan`, { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    scanData = await res.json();
    renderResults(scanData, previewImg.src);
  } catch (e) {
    document.getElementById('error-area').innerHTML =
      `<div class="error-box">
        <strong>Connection error</strong><br>
        ${e.message}<br><br>
        Make sure the FastAPI server is running at <code>${API_URL}</code>
        and CORS is enabled.
      </div>`;
  }
  setLoading(false);
}

function setLoading(on) {
  scanBtn.disabled = on;
  scanBtn.innerHTML = on
    ? `<span class="btn-spinner"></span> Analysing...`
    : 'Analyse Field';
  if (on) scanBtn.classList.add('loading');
  else    scanBtn.classList.remove('loading');
}

function clearResults() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('error-area').innerHTML = '';
  selCell = null; scanData = null;
}

// ── Render ────────────────────────────────────────────────────────────────────

function severityColor(s) {
  if (s >= 0.75) return '#c0392b';
  if (s >= 0.60) return '#e74c3c';
  if (s >= 0.45) return '#e85d26';
  if (s >= 0.30) return '#f5a623';
  if (s >= 0.20) return '#d4c84a';
  if (s >= 0.10) return '#aed581';
  return '#2e7d32';
}

function renderResults(data, imgSrc) {
  document.getElementById('empty-state').style.display = 'none';
  const s = data.summary;

  const bannerClass = s.critical_zones > 6 ? 'banner-critical'
    : s.moderate_zones > 6                  ? 'banner-moderate'
    : 'banner-ok';

  const html = `
    <!-- Scan meta -->
    <div class="scan-meta">
      <span>ID <strong>${data.scan_id}</strong></span>
      <span>File <strong>${data.filename}</strong></span>
      <span>Grid <strong>${data.grid_rows}×${data.grid_cols}</strong></span>
      <span>Affected <strong>${s.affected_pct}%</strong></span>
    </div>

    <!-- Metrics -->
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-val val-critical">${s.critical_zones}</div>
        <div class="metric-lbl">Critical</div>
      </div>
      <div class="metric-card">
        <div class="metric-val val-moderate">${s.moderate_zones}</div>
        <div class="metric-lbl">Moderate</div>
      </div>
      <div class="metric-card">
        <div class="metric-val val-low">${s.low_zones}</div>
        <div class="metric-lbl">Low risk</div>
      </div>
      <div class="metric-card">
        <div class="metric-val val-neutral">${s.healthy_zones}</div>
        <div class="metric-lbl">Healthy</div>
      </div>
    </div>

    <!-- Action banner -->
    <div class="action-banner ${bannerClass}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/>
      </svg>
      ${s.recommended_action}
      ${s.diseases_detected.length ? `— <em>${s.diseases_detected.join(', ')}</em>` : ''}
    </div>

    <!-- Heatmap + zone detail -->
    <div class="heatmap-layout">
      <div class="heatmap-card">
        <div class="card-label">Disease intensity map — click a zone</div>
        <div class="heatmap-container" id="heatmap-container">
          <img id="heatmap-base-img" src="${imgSrc}" alt="field"/>
          <div id="heatmap-overlay"></div>
        </div>
        <div class="legend-strip">
          <span class="legend-txt">Healthy</span>
          <div class="legend-grad"></div>
          <span class="legend-txt">Critical</span>
        </div>
      </div>

      <div class="zone-card" id="zone-card">
        <div class="card-label">Zone detail</div>
        <div class="zone-placeholder">Tap any zone on<br>the heatmap to inspect it.</div>
      </div>
    </div>
  `;

  const container = document.getElementById('results');
  container.innerHTML = html;
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.gap = '14px';

  buildHeatmap(data);
}

function buildHeatmap(data) {
  const overlay = document.getElementById('heatmap-overlay');
  overlay.style.gridTemplateColumns = `repeat(${data.grid_cols}, 1fr)`;
  overlay.style.gridTemplateRows    = `repeat(${data.grid_rows}, 1fr)`;

  data.zones.forEach(z => {
    const cell = document.createElement('div');
    cell.className = 'h-cell';
    cell.style.background = severityColor(z.severity) + 'cc'; // slight transparency
    cell.title = `${z.disease} · ${z.severity_label}`;
    cell.addEventListener('click', () => selectZone(z, cell));
    overlay.appendChild(cell);
  });
}

function selectZone(z, el) {
  if (selCell) selCell.classList.remove('sel');
  el.classList.add('sel');
  selCell = el;

  const color     = severityColor(z.severity);
  const pct       = Math.round(z.severity * 100);
  const conf      = Math.round(z.confidence * 100);
  const badgeCls  = `badge-${z.severity_label}`;
  const isHealthy = z.disease === 'Healthy';

  document.getElementById('zone-card').innerHTML = `
    <div class="card-label">Zone — row ${z.row + 1} · col ${z.col + 1}</div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div class="zone-disease-name">${z.disease}</div>
      <span class="zone-badge ${badgeCls}">${z.severity_label.toUpperCase()}</span>
    </div>

    <div class="sev-bar-track">
      <div class="sev-bar-fill" style="width:${pct}%;background:${color}"></div>
    </div>

    <div class="zone-meta">
      <div class="zone-row">
        <span class="zk">Severity</span>
        <span class="zv">${pct}%</span>
      </div>
      <div class="zone-row">
        <span class="zk">Confidence</span>
        <span class="zv">${conf}%</span>
      </div>
      ${!isHealthy ? `
      <div class="zone-row">
        <span class="zk">Yield impact</span>
        <span class="zv" style="color:var(--orange);font-size:10px;text-align:right;max-width:160px;">${z.yield_impact}</span>
      </div>
      <div class="zone-row">
        <span class="zk">Spread</span>
        <span class="zv" style="font-size:10px;text-align:right;max-width:160px;">${z.spread_note}</span>
      </div>` : ''}
    </div>

    ${!isHealthy ? `
    <div class="treatment-section">
      <div class="treat-title">Recommended actions</div>
      ${z.treatments.map(t => `<div class="treat-item">${t}</div>`).join('')}
    </div>` : `
    <div style="color:var(--green);font-size:12px;font-weight:500;">✓ This zone is healthy. No action required.</div>
    `}
  `;
}
</script>
</body>
</html>
